<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="归宁 - 一个简洁优雅的静态网页" />
  <title>归宁·优选域名</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(255,255,255,.08);
      --card-border: rgba(255,255,255,.14);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #7c3aed;
      --accent2: #22c55e;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(124,58,237,.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(34,197,94,.18), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    .card {
      width: min(920px, 100%);
      border: 1px solid var(--card-border);
      background: var(--card);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero {
      padding: 72px 28px 42px;
      text-align: center;
      position: relative;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 8vw, 84px);
      line-height: 1;
      letter-spacing: .08em;
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(16px, 2.4vw, 20px);
      line-height: 1.8;
    }

    .panel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 0 28px 28px;
    }

    .box {
      background: rgba(15, 23, 42, .45);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 20px;
      min-height: 140px;
    }

    .box h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #fff;
    }

    .box p, .box a {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      text-decoration: none;
      word-break: break-all;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 0 28px 34px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 140px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(59,130,246,.9));
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(124,58,237,.25);
      transition: transform .2s ease, opacity .2s ease;
    }

    .btn.secondary {
      background: rgba(255,255,255,.06);
      box-shadow: none;
    }

    .btn:hover { transform: translateY(-2px); opacity: .95; }

    .footer {
      padding: 0 28px 28px;
      color: rgba(229,231,235,.65);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 760px) {
      .hero { padding-top: 56px; }
      .panel { grid-template-columns: 1fr; }
      .links { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="hero">
        <div class="badge">Cloudflare Pages · 归宁</div>
        <h1>归宁·优选域名</h1>
        <p class="subtitle">
          站点地址：<strong>cf.78607323.xyz</strong>
        </p>
      </div>

      <div class="panel">
        <div class="box">
          <h2>站点信息</h2>
          <p>名称：归宁</p>
          <p>网址：cf.78607323.xyz</p>
        </div>

        <div class="box">
          <h2>优选域名</h2>
          <p>三网自适应：cf.78607323.xyz</p>
          <p>电信优选：ct.78607323.xyz</p>
          <p>移动优选：cm.78607323.xyz</p>
          <p>联通优选：cu.78607323.xyz</p>
        </div>

        <div class="box">
          <h2>使用说明</h2>
          <p>欢迎使用归宁优选域名，cname解析到左边的域名即可给个人网站加速！</p>
        </div>
      </div>

      <div class="links">
        <a class="btn" href="https://cf.78607323.xyz" target="_blank" rel="noreferrer">打开站点</a>
        <a class="btn secondary" href="https://t.me/icc469">联系站长</a>
      </div>

      <div class="footer">
        © 2026 归宁 · Powered by Cloudflare Pages
      </div>
    </section>
  </main>
</body>
</html>
